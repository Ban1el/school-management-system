<div class="flex flex-col h-screen">
  <!-- Navbar -->
  <nav class="navbar w-full flex justify-between shrink-0 bg-sky-600 px-3">
    <span
      class="material-symbols-outlined cursor-pointer select-none px-1 text-white"
      (click)="toggleSidebar()"
      >menu</span
    >
    <div class="px-4 font-bold text-white">SMS</div>

    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
          <img
            alt="Tailwind CSS Navbar component"
            src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
          />
        </div>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
      >
        <li routerLink="user/profile">
          <a class="justify-between"> Profile </a>
        </li>
        <li><a>Settings</a></li>
        <li (click)="logout()"><a>Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Below navbar: sidebar + content -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside
      [class]="isSidebarOpen ? 'w-50' : 'w-15'"
      class="overflow-y-auto overflow-x-hidden bg-sky-700 text-white text-sm transition-all duration-300"
    >
      <ul>
        <li
          class="p-3 flex items-center gap-3 border-b border-sky-400 cursor-pointer"
          routerLink="/home"
        >
          <span
            [class]="isSidebarOpen ? 'w-6' : 'w-full text-center'"
            class="material-symbols-outlined select-none shrink-0 transition-all duration-300"
          >
            home
          </span>
          <span
            [class]="isSidebarOpen ? 'opacity-100 max-w-xs' : 'opacity-0 max-w-0'"
            class="select-none transition-all duration-300 overflow-hidden whitespace-nowrap"
          >
            Dashboard
          </span>
        </li>
        <li
          class="p-3 flex items-center gap-3 border-b border-sky-400 cursor-pointer"
          routerLink="/user/management"
        >
          <span
            [class]="isSidebarOpen ? 'w-6' : 'w-full text-center'"
            class="material-symbols-outlined select-none shrink-0 transition-all duration-300"
          >
            user_attributes
          </span>
          <span
            [class]="isSidebarOpen ? 'opacity-100 max-w-xs' : 'opacity-0 max-w-0'"
            class="select-none transition-all duration-300 overflow-hidden whitespace-nowrap"
          >
            User management
          </span>
        </li>
      </ul>
    </aside>

    <!-- Page content -->
    <div class="flex-1 overflow-auto p-4">
      <div class="card bg-base-100 shadow-xl h-full">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
