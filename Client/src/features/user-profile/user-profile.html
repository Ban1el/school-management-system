<div class="m-25">
  <div class="grid grid-cols-2 gap-3 mb-5">
    <div class="flex flex-row gap-4 items-center">
      <img
        src="content/images/default-profile.png"
        alt="Profile"
        class="w-32 h-32 rounded-full object-cover"
      />
      <div>
        <p>Daniel Troy Aromin</p>
        <p>test@test.com</p>
      </div>
    </div>

    <div class="flex justify-end">
      <button
        class="btn w-40"
        [class]="isEdit() ? 'btn-error' : 'btn-primary'"
        (click)="toggleEdit()"
      >
        {{ isEdit() ? 'Cancel' : 'Edit' }}
      </button>
    </div>
  </div>

  <div>
    <h1 class="text-lg font-bold">Personal Info</h1>
  </div>

  <form [formGroup]="form">
    <div class="grid grid-cols-3 gap-2">
      <fieldset class="fieldset">
        <legend class="fieldset-legend">First Name</legend>
        <input
          type="text"
          class="input w-full"
          placeholder="Enter first name"
          formControlName="firstName"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Middle Name</legend>
        <input
          type="text"
          class="input w-full"
          placeholder="Enter last name"
          formControlName="middleName"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Last Name</legend>
        <input
          type="text"
          class="input w-full"
          placeholder="Enter last name"
          formControlName="lastName"
        />
      </fieldset>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-5">
      <fieldset class="fieldset">
        <legend class="fieldset-legend">Mobile Number</legend>
        <div class="flex items-center input w-full p-0 overflow-hidden">
          <span
            class="px-3 py-2 bg-base-200 text-base-content border-r border-base-300 h-full flex items-center"
          >
            +63
          </span>
          <input
            type="tel"
            class="flex-1 px-3 py-2 outline-none bg-transparent"
            placeholder="9XX XXX XXXX"
            formControlName="mobileNumber"
          />
        </div>
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Email Address</legend>
        <input
          type="text"
          class="input w-full"
          placeholder="Enter email address"
          formControlName="email"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Gender</legend>

        <select class="select w-full" formControlName="gender">
          <option selected="selected" value="0">Select Gender</option>
          @for (dropdown of genders(); track $index) {
            <option [value]="dropdown.id">{{ dropdown.name }}</option>
          }
        </select>
      </fieldset>
    </div>

    <hr class="border-sky-700 mb-5" />

    <div>
      <h1 class="text-lg font-bold">Address</h1>
    </div>

    <div class="grid grid-cols-3 gap-2">
      <fieldset class="fieldset">
        <legend class="fieldset-legend">Region</legend>
        <app-dropdown-paginate
          label="Select Region"
          legendLabel="Region Name"
          [items]="regionFilter.items()"
          [loading]="regionFilter.loading()"
          (searchChanged)="regionFilter.onSearch($event)"
          (scrolledToBottom)="regionFilter.loadMore()"
          (itemSelected)="onRegionSelected($event)"
          formControlName="region"
        />
      </fieldset>

      <fieldset class="fieldset" [class.hidden]="provinceHidden()">
        <legend class="fieldset-legend">Province</legend>
        <app-dropdown-paginate
          label="Select Province"
          legendLabel="Region Name"
          [items]="provinceFilter.items()"
          [loading]="provinceFilter.loading()"
          (searchChanged)="provinceFilter.onSearch($event)"
          (scrolledToBottom)="provinceFilter.loadMore()"
          (itemSelected)="onProvinceSelected($event)"
          formControlName="province"
        />
      </fieldset>
      <fieldset class="fieldset">
        <legend class="fieldset-legend">City / Municipality</legend>
        <app-dropdown-paginate
          label="Select City Municipality"
          legendLabel="City / Municipality Name"
          [items]="cityMunicipalityFilter.items()"
          [loading]="cityMunicipalityFilter.loading()"
          (searchChanged)="cityMunicipalityFilter.onSearch($event)"
          (scrolledToBottom)="cityMunicipalityFilter.loadMore()"
          (itemSelected)="onCityMunicipalitySelected($event)"
          formControlName="cityMunicipality"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Barangay</legend>
        <app-dropdown-paginate
          formControlName="barangay"
          label="Select Barangay"
          legendLabel="Barangay Name"
          [items]="barangayFilter.items()"
          [loading]="barangayFilter.loading()"
          (searchChanged)="barangayFilter.onSearch($event)"
          (scrolledToBottom)="barangayFilter.loadMore()"
          formControlName="barangay"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Zip code</legend>
        <input
          type="text"
          class="input w-full"
          placeholder="Enter zip code"
          formControlName="zipCode"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Street Address</legend>
        <input
          type="text"
          class="input w-full"
          placeholder="Enter street address"
          formControlName="streetAddress"
        />
      </fieldset>
    </div>
  </form>
</div>
